x-analyze-volumes: &analyze-volumes
  - ../packages/visualizer-poc/public/audio:/data/audio:ro
  - ../packages/visualizer-poc/data:/data/output
  - ../data/stems:/data/stems:ro
  - ../packages/visualizer-poc/data:/data/setlist:ro

x-gpu-volumes: &gpu-volumes
  - ../packages/visualizer-poc/public/audio:/data/audio:ro
  - ../data/stems:/data/stems
  - ../data/lyrics:/data/lyrics
  - ../data/cache:/data/cache

services:
  # ── Analyze image services ──────────────────────────────────

  analyze:
    build:
      context: ..
      dockerfile: docker/Dockerfile.analyze
    image: dead-air-analyze
    volumes: *analyze-volumes
    command: ["analyze"]

  analyze-show:
    build:
      context: ..
      dockerfile: docker/Dockerfile.analyze
    image: dead-air-analyze
    volumes: *analyze-volumes
    command: ["analyze-show"]

  # ── GPU image services ──────────────────────────────────────

  separate-stems:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
    image: dead-air-gpu
    volumes: *gpu-volumes
    command: ["separate-stems"]
    stdin_open: true
    deploy:
      resources:
        limits:
          memory: 8g

  align-lyrics:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
    image: dead-air-gpu
    volumes: *gpu-volumes
    command: ["align-lyrics"]
    stdin_open: true
    deploy:
      resources:
        limits:
          memory: 6g

  analyze-audio:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
    image: dead-air-gpu
    volumes: *gpu-volumes
    command: ["analyze-audio"]
    stdin_open: true

  # ── Manifest generator (Node + TS, no GPU) ──────────────────

  generate-manifest:
    build:
      context: ..
      dockerfile: docker/Dockerfile.manifest
    image: dead-air-manifest
    volumes:
      - ../data:/data/in:ro
      - ../out:/data/out
    # Override at run time: docker compose run generate-manifest <args>
    command: ["--data-dir", "/data/in", "--output", "/data/out/manifest.msgpack"]

  # ── Rust GPU renderer (requires --gpus all on Linux/CUDA host) ──

  render:
    build:
      context: ..
      dockerfile: docker/Dockerfile.renderer
    image: dead-air-renderer
    volumes:
      - ../out:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - "--manifest"
      - "/data/manifest.msgpack"
      - "--output"
      - "/data/show.mp4"
      - "--width"
      - "3840"
      - "--height"
      - "2160"
      - "--fps"
      - "60"
