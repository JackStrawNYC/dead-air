[package]
name = "dead-air-renderer"
version = "0.1.0"
edition = "2021"
description = "GPU-native GLSL shader renderer for Dead Air visual engine"

[dependencies]
# GPU rendering
wgpu = "24"
# Async runtime (wgpu needs it)
pollster = "0.4"
# Image output
image = "0.25"
# JSON parsing (frame manifests, audio data)
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# CLI argument parsing
clap = { version = "4", features = ["derive"] }
# GLSL to SPIR-V compilation
naga = { version = "24", features = ["glsl-in", "spv-out", "wgsl-out"] }
# Progress bars
indicatif = "0.17"
# Parallel frame output
rayon = "1"
# Logging
env_logger = "0.11"
log = "0.4"
# Byte manipulation for GPU buffers
bytemuck = { version = "1", features = ["derive"] }
# MessagePack binary manifest format (10x faster than JSON for large manifests)
rmp-serde = "1"
# SVG rasterization (overlay rendering without Chrome)
resvg = "0.45"
# Tiny SVG parser (resvg dependency)
usvg = "0.45"
# Base64 encoding (for embedding brand PNG in SVG overlays)
base64 = "0.22"

[profile.release]
opt-level = 3
lto = true
